# PENDING — activate at the merge-failsafe flip:
#   git mv .github/workflows.pending/ci.yml .github/workflows/
#   + declare in governance/environment.json
#   + requires a workflow-scope token to push under .github/workflows/.
# While it lives here (not under .github/workflows/) it is inert: GitHub Actions does
# not run it, and governance-check's checkDeclaredWorkflows does not govern it.
name: CI

# The merge gate: the four enforcement checks + all tests must pass before main moves.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Harness doctor (drift-check, fail-closed)
        run: node governance/enforcement/doctor.mjs
      - name: Governance check (self-governance, fail-closed)
        run: node governance/enforcement/governance-check.mjs
      - name: Structure check
        run: node governance/enforcement/structure-check.mjs
      - name: No ghost agent
        run: node governance/enforcement/no-ghost-agent.mjs
      - name: Harness + governance tests
        run: node --test $(find harness governance -name '*.test.mjs')
