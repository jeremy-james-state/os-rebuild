# ACTIVE — the merge gate. Runs the four enforcement checks + all tests on every
# PR + push to main; declared in governance/environment.json (ci-merge-gate) and
# bound as the REQUIRED status check ('checks') on the main-branch-governance ruleset.
name: CI

# The merge gate: the four enforcement checks + all tests must pass before main moves.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history + tags — checkVersionBumpOnChange baselines against the harness-v* release tags; a shallow checkout has none → the check fail-opens → versioning NOT enforced
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Harness doctor (drift-check, fail-closed)
        run: node governance/enforcement/doctor.mjs
      - name: Governance check (self-governance, fail-closed)
        run: node governance/enforcement/governance-check.mjs
      - name: Structure check
        run: node governance/enforcement/structure-check.mjs
      - name: No ghost agent
        run: node governance/enforcement/no-ghost-agent.mjs
      - name: Harness + governance tests
        run: node --test $(find harness governance -name '*.test.mjs')
