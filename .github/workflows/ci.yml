# ACTIVE — the merge gate. Runs the four enforcement checks + all tests on every
# PR + push to main; declared in governance/environment.json (ci-merge-gate) and
# bound as the REQUIRED status check ('checks') on the main-branch-governance ruleset.
name: CI

# The merge gate: the four enforcement checks + all tests must pass before main moves.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history + tags — checkVersionBumpOnChange baselines against the harness-v* release tags; a shallow checkout has none → the check fail-opens → versioning NOT enforced
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Harness doctor (drift-check, fail-closed)
        run: node governance/checks/doctor.mjs
      - name: Governance check (self-governance, fail-closed)
        run: node governance/checks/governance-check.mjs
      - name: Structure check
        run: node governance/checks/structure-check.mjs
      - name: No ghost agent
        run: node governance/checks/no-ghost-agent.mjs
      - name: Harness + governance tests
        # --test-concurrency=1: run test files serially. The session-feedback CLI test spawns the
        # real doctor under the orchestrator's hard 5s spawnSync timeout; under parallel load on a
        # 2-core CI runner that doctor exceeds 5s, the loop fails-open to 'failed' (by design) and
        # the block-decision assertion flakes. Serial keeps the doctor under budget deterministically.
        run: node --test --test-concurrency=1 $(find harness apps governance .system -name '*.test.mjs')
