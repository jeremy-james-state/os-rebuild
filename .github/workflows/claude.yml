# Harness write-path: Claude acts through the GitHub App (claude[bot]) via Actions.
# See governance/decisions/identity.md — the App is the single, scoped, non-admin
# write-identity for the harness; this workflow is its first wired path.
#
# ┌─ COST SAFETY — READ BEFORE EDITING ────────────────────────────────────────┐
# │ Auth is CLAUDE_CODE_OAUTH_TOKEN = your Pro/Max SUBSCRIPTION (no API charge). │
# │ Do NOT add `anthropic_api_key` / ANTHROPIC_API_KEY anywhere: it TAKES        │
# │ PRECEDENCE and silently switches to pay-per-token API billing.              │
# │ Generate the token locally with `claude setup-token`, store it as the       │
# │ CLAUDE_CODE_OAUTH_TOKEN repo secret. After the first run, confirm           │
# │ console.anthropic.com shows zero usage.                                      │
# └─────────────────────────────────────────────────────────────────────────────┘

name: Claude

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]

# The workflow's own GITHUB_TOKEN — least privilege. The App token minted below
# is what actually writes (as claude[bot]).
permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  claude:
    # Only act when @claude is explicitly mentioned.
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mint a short-lived App token (the claude[bot] identity)
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.HARNESS_APP_ID }}
          private-key: ${{ secrets.HARNESS_APP_PRIVATE_KEY }}

      - name: Run Claude Code (subscription auth — see header)
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # NO anthropic_api_key — subscription billing only.
